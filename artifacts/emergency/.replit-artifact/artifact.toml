kind = "web"
previewPath = "/emergency/"
title = "Khurais Emergency Alert System"
version = "1.0.0"
id = "artifacts/emergency"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24617
name = "web"
paths = ["/emergency/"]

[services.development]
run = "pnpm --filter @workspace/emergency run dev"

[services.env]
PORT = "24617"
BASE_PATH = "/emergency/"

[services.production]
build = ["pnpm", "--filter", "@workspace/emergency", "run", "build"]
publicDir = "artifacts/emergency/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
